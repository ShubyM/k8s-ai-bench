script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sImageDigests\nmetadata:\n  name:\
    \ container-image-must-have-digest\nspec:\n  match:\n    kinds:\n      - apiGroups:\
    \ [\"\"]\n        kinds: [\"Pod\"]\n    namespaces:\n      - \"default\"\n```\n\
    \nTwo resources have been deployed in namespace 'gk-test-019'. Examine them and\
    \ determine which resource(s) violate the above constraint policy. Explain your\
    \ reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
