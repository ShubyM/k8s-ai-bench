script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sRequiredLabels\nmetadata:\n  name:\
    \ all-must-have-owner\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"\"]\n\
    \        kinds: [\"Namespace\"]\n  parameters:\n    message: \"All namespaces\
    \ must have an `owner` label that points to your company username\"\n    labels:\n\
    \      - key: owner\n        allowedRegex: \"^[a-zA-Z]+.agilebank.demo$\"\n```\n\
    \nTwo resources have been deployed in namespace 'gk-test-023'. Examine them and\
    \ determine which resource(s) violate the above constraint policy. Explain your\
    \ reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
