script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sDisallowedTags\nmetadata:\n  name:\
    \ container-image-must-not-have-latest-tag\nspec:\n  match:\n    kinds:\n    \
    \  - apiGroups: [\"\"]\n        kinds: [\"Pod\"]\n    namespaces:\n      - \"\
    default\"\n  parameters:\n    tags: [\"latest\"]\n    exemptImages: [\"openpolicyagent/opa-exp:latest\"\
    , \"openpolicyagent/opa-exp2:latest\"]\n```\n\nTwo resources have been deployed\
    \ in namespace 'gk-test-012'. Examine them and determine which resource(s) violate\
    \ the above constraint policy.\n\nAfter your analysis, output a single line starting\
    \ with \"VIOLATING:\" followed by the resource name(s) that violate the policy."
  setup: setup.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: 'VIOLATING:'
  - contains: resource-beta
