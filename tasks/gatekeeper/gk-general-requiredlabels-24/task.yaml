script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sRequiredLabels\nmetadata:\n  name:\
    \ must-have-pizza\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"\"]\n  \
    \      kinds: [\"Pod\"]\n  parameters:\n    message: \"All pods must have label\
    \ of key `pizza` regardless of the label's value\"\n    labels:\n      - key:\
    \ pizza\n```\n\nTwo resources have been deployed in namespace 'gk-test-024'. Examine\
    \ them and determine which resource(s) violate the above constraint policy. Explain\
    \ your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
