    ]\n      - apiGroups: [\"coordination.k8s.io\"]\n        kinds: [\"Lease\"]\n\
    \      - apiGroups: [\"extensions\", \"networking.k8s.io\"]\n        kinds: [\"\
    Ingress\"]\n      - apiGroups: [\"networking.k8s.io\"]\n        kinds: [\"IngressClass\"\
