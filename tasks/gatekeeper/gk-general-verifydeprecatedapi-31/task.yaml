    ]\n        kinds: [\"MutatingWebhookConfiguration\", \"ValidatingWebhookConfiguration\"\
    ]\n      - apiGroups: [\"apiextensions.k8s.io\"]\n        kinds: [\"CustomResourceDefinition\"\
    ]\n      - apiGroups: [\"apiregistration.k8s.io\"]\n        kinds: [\"APIService\"\
    ]\n      - apiGroups: [\"authentication.k8s.io\"]\n        kinds: [\"TokenReview\"\
