script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sRequiredAnnotations\nmetadata:\n\
    \  name: all-must-have-certain-set-of-annotations\nspec:\n  match:\n    kinds:\n\
    \      - apiGroups: [\"\"]\n        kinds: [\"Service\"]\n  parameters:\n    message:\
    \ \"All services must have a `a8r.io/owner` and `a8r.io/runbook` annotations.\"\
    \n    annotations:\n      - key: a8r.io/owner\n        # Matches email address\
    \ or github user\n        allowedRegex: ^([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,6}|[a-z]{1,39})$\n\
    \      - key: a8r.io/runbook\n        # Matches urls including or not http/https\n\
    \        allowedRegex: ^(http:\\/\\/www\\.|https:\\/\\/www\\.|http:\\/\\/|https:\\\
    /\\/)?[a-z0-9]+([\\-\\.]{1}[a-z0-9]+)*\\.[a-z]{2,5}(:[0-9]{1,5})?(\\/.*)?$\n```\n\
    \nTwo resources have been deployed in namespace 'gk-test-022'. Examine them and\
    \ determine which resource(s) violate the above constraint policy.\n\nAfter your\
    \ analysis, output a single line starting with \"VIOLATING:\" followed by the\
    \ resource name(s) that violate the policy."
  setup: setup.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: 'VIOLATING:'
  - contains: resource-beta
