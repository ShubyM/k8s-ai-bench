script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sPSPAllowPrivilegeEscalationContainer\n\
    metadata:\n  name: psp-allow-privilege-escalation-container\nspec:\n  match:\n\
    \    kinds:\n      - apiGroups: [\"\"]\n        kinds: [\"Pod\"]\n  parameters:\n\
    \    exemptImages: [\"safeimages.com/*\"]\n```\n\nTwo resources have been deployed\
    \ in namespace 'gk-test-036'. Examine them and determine which resource(s) violate\
    \ the above constraint policy. Explain your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
