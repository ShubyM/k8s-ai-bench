script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sUniqueIngressHost\nmetadata:\n \
    \ name: unique-ingress-host\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"\
    extensions\", \"networking.k8s.io\"]\n        kinds: [\"Ingress\"]\n```\n\nTwo\
    \ resources have been deployed in namespace 'gk-test-028'. Examine them and determine\
    \ which resource(s) violate the above constraint policy.\n\nAfter your analysis,\
    \ output a single line starting with \"VIOLATING:\" followed by the resource name(s)\
    \ that violate the policy."
  setup: setup.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: 'VIOLATING:'
  - contains: resource-beta
