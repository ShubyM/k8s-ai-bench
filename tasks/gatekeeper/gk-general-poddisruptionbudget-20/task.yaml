script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sPodDisruptionBudget\nmetadata:\n\
    \  name: pod-distruption-budget\nspec:\n  match:\n    kinds:\n      - apiGroups:\
    \ [\"apps\"]\n        kinds: [\"Deployment\", \"StatefulSet\"]\n      - apiGroups:\
    \ [\"policy\"]\n        kinds: [\"PodDisruptionBudget\"]\n      - apiGroups: [\"\
    \"]\n        kinds: [\"ReplicationController\"]\n```\n\nTwo resources have been\
    \ deployed in namespace 'gk-test-020'. Examine them and determine which resource(s)\
    \ violate the above constraint policy.\n\nAfter your analysis, output a single\
    \ line starting with \"VIOLATING:\" followed by the resource name(s) that violate\
    \ the policy."
  setup: setup.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: 'VIOLATING:'
  - contains: resource-beta
