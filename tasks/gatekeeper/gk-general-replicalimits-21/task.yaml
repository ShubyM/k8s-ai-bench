script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sReplicaLimits\nmetadata:\n  name:\
    \ replica-limits\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"apps\"]\n\
    \        kinds: [\"Deployment\"]\n  parameters:\n    ranges:\n    - min_replicas:\
    \ 3\n      max_replicas: 50\n```\n\nTwo resources have been deployed in namespace\
    \ 'gk-test-021'. Examine them and determine which resource(s) violate the above\
    \ constraint policy. Explain your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
