script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sPSPCapabilities\nmetadata:\n  name:\
    \ capabilities-demo\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"\"]\n\
    \        kinds: [\"Pod\"]\n    namespaces:\n      - \"default\"\n  parameters:\n\
    \    allowedCapabilities: [\"something\"]\n    requiredDropCapabilities: [\"must_drop\"\
    ]\n```\n\nTwo resources have been deployed in namespace 'gk-test-038'. Examine\
    \ them and determine which resource(s) violate the above constraint policy.\n\n\
    After your analysis, output a single line starting with \"VIOLATING:\" followed\
    \ by the resource name(s) that violate the policy."
  setup: setup.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: 'VIOLATING:'
  - contains: resource-beta
