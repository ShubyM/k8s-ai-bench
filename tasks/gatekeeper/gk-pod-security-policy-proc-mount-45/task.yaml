script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sPSPProcMount\nmetadata:\n  name:\
    \ psp-proc-mount\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"\"]\n   \
    \     kinds: [\"Pod\"]\n  parameters:\n    procMount: Default\n    exemptImages:\n\
    \    - \"safeimages.com/*\"\n```\n\nTwo resources have been deployed in namespace\
    \ 'gk-test-045'. Examine them and determine which resource(s) violate the above\
    \ constraint policy. Explain your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
