script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sHorizontalPodAutoscaler\nmetadata:\n\
    \  name: horizontal-pod-autoscaler\nspec:\n  enforcementAction: deny\n  match:\n\
    \    kinds:\n      - apiGroups: [\"autoscaling\"]\n        kinds: [\"HorizontalPodAutoscaler\"\
    ]\n  parameters:\n    minimumReplicaSpread: 1\n    enforceScaleTargetRef: true\n\
    \    ranges:\n    - min_replicas: 3\n      max_replicas: 6\n```\n\nTwo resources\
    \ have been deployed in namespace 'gk-test-016'. Examine them and determine which\
    \ resource(s) violate the above constraint policy. Explain your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
