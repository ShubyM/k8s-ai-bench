script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: VerifyDeprecatedAPI\nmetadata:\n  name:\
    \ verify-1.25\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"batch\"]\n \
    \       kinds: [\"CronJob\"]\n      - apiGroups: [\"discovery.k8s.io\"]\n    \
    \    kinds: [\"EndpointSlice\"]\n      - apiGroups: [\"events.k8s.io\"]\n    \
    \    kinds: [\"Event\"]\n      - apiGroups: [\"autoscaling\"]\n        kinds:\
    \ [\"HorizontalPodAutoscaler\"]\n      - apiGroups: [\"policy\"]\n        kinds:\
    \ [\"PodDisruptionBudget\", \"PodSecurityPolicy\"]\n      - apiGroups: [\"node.k8s.io\"\
    ]\n        kinds: [\"RuntimeClass\"]\n  parameters:\n    kvs:\n      - deprecatedAPI:\
    \ \"batch/v1beta1\"\n        kinds: [\"CronJob\"]\n        targetAPI: \"batch/v1\"\
    \n      - deprecatedAPI: \"discovery.k8s.io/v1beta1\"\n        kinds: [\"EndpointSlice\"\
    ]\n        targetAPI: \"discovery.k8s.io/v1\"\n      - deprecatedAPI: \"events.k8s.io/v1beta1\"\
    \n        kinds: [\"Event\"]\n        targetAPI: \"events.k8s.io/v1\"\n      -\
    \ deprecatedAPI: \"autoscaling/v2beta1\"\n        kinds: [\"HorizontalPodAutoscaler\"\
    ]\n        targetAPI: \"autoscaling/v2\"\n      - deprecatedAPI: \"policy/v1beta1\"\
    \n        kinds: [\"PodDisruptionBudget\"]\n        targetAPI: \"policy/v1\"\n\
    \      - deprecatedAPI: \"policy/v1beta1\"\n        kinds: [\"PodSecurityPolicy\"\
    ]\n        targetAPI: \"None\"\n      - deprecatedAPI: \"node.k8s.io/v1beta1\"\
    \n        kinds: [\"RuntimeClass\"]\n        targetAPI: \"node.k8s.io/v1\"\n \
    \   k8sVersion: 1.25\n```\n\nTwo resources have been deployed in namespace 'gk-test-032'.\
    \ Examine them and determine which resource(s) violate the above constraint policy.\
    \ Explain your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
