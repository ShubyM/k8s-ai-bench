script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: VerifyDeprecatedAPI\nmetadata:\n  name:\
    \ verify-1.27\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"storage.k8s.io\"\
    ]\n        kinds: [\"CSIStorageCapacity\"]\n  parameters:\n    kvs: \n      -\
    \ deprecatedAPI: \"storage.k8s.io/v1beta1\"\n        kinds: [\"CSIStorageCapacity\"\
    ]\n        targetAPI: \"storage.k8s.io/v1\"\n    k8sVersion: 1.27\n```\n\nTwo\
    \ resources have been deployed in namespace 'gk-test-034'. Examine them and determine\
    \ which resource(s) violate the above constraint policy. Explain your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
