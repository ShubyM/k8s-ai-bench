    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sBlockEndpointEditDefaultRole\nmetadata:\n\
    \  name: block-endpoint-edit-default-role\nspec:\n  match:\n    kinds:\n     \
    \ - apiGroups: [\"rbac.authorization.k8s.io\"]\n        kinds: [\"ClusterRole\"\
    ]\n```\n\nTwo resources have been deployed in namespace 'gk-test-003'. Examine\
    \ them and determine which resource(s) violate the above constraint policy. Explain\
    \ your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
