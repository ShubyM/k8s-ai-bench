script:
- prompt: "The following Gatekeeper constraint policy is in effect:\n\n```yaml\napiVersion:\
    \ constraints.gatekeeper.sh/v1beta1\nkind: K8sContainerRequests\nmetadata:\n \
    \ name: container-must-have-requests\nspec:\n  match:\n    kinds:\n      - apiGroups:\
    \ [\"\"]\n        kinds: [\"Pod\"]\n  parameters:\n    cpu: \"200m\"\n    memory:\
    \ \"1Gi\"\n```\n\nTwo resources have been deployed in namespace 'gk-test-007'.\
    \ Examine them and determine which resource(s) violate the above constraint policy.\
    \ Explain your reasoning."
  setup: setup.sh
  verifier: verify.sh
  cleanup: cleanup.sh
  difficulty: medium
  expect:
  - contains: resource-beta
